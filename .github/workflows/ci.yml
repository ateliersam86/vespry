# CI — vérifie types, tests et build à chaque push / pull request.
name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      # Build Firefox en parallèle pour détecter toute régression du portage.
      # Pas de `tsc --noEmit` ici (déjà fait au-dessus) — uniquement vite.
      - run: npx vite build --config vite.firefox.config.ts
      # Lint AMO : web-ext lint échoue uniquement sur les erreurs (warnings
      # tolérés). Garantit que `dist-firefox/` reste soumissible à AMO.
      - run: npm run firefox:lint
